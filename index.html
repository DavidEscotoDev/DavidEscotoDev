<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David Escoto — Interactive Terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Monaco', 'Consolas', monospace;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .terminal {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .header {
      border: 1px solid #30363d;
      border-radius: 6px 6px 0 0;
      background: #161b22;
      padding: 12px 16px;
      font-size: 12px;
      color: #8b949e;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .traffic-light { width: 10px; height: 10px; border-radius: 50%; }
    .tl-red { background: #ff5f57; }
    .tl-yellow { background: #ffbd2e; }
    .tl-green { background: #28ca42; }
    .output {
      flex: 1;
      border: 1px solid #30363d;
      border-top: none;
      border-radius: 0 0 6px 6px;
      background: #0d1117;
      padding: 16px;
      overflow-y: auto;
      min-height: 400px;
      line-height: 1.6;
    }
    .line { margin-bottom: 4px; white-space: pre-wrap; word-wrap: break-word; }
    .line.banner { color: #58a6ff; font-weight: bold; }
    .line.dim { color: #8b949e; }
    .line.success { color: #3fb950; }
    .line.warning { color: #d29922; }
    .line.error { color: #f85149; }
    .line.cmd { color: #58a6ff; }
    .line.path { color: #a371f7; }
    .line.key { color: #ffa657; }
    .line.val { color: #c9d1d9; }
    .line.url { color: #58a6ff; text-decoration: underline; cursor: pointer; }
    .input-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .prompt { color: #58a6ff; white-space: nowrap; }
    .prompt-path { color: #a371f7; }
    .prompt-symbol { color: #58a6ff; }
    input.cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e6edf3;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
    }
    .cursor {
      display: inline-block;
      width: 8px;
      height: 18px;
      background: #58a6ff;
      animation: blink 1s infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
    .hidden { display: none !important; }
    .suggestion {
      position: absolute;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      color: #8b949e;
      z-index: 100;
      max-height: 200px;
      overflow-y: auto;
    }
    .suggestion-item {
      padding: 2px 8px;
      cursor: pointer;
      border-radius: 3px;
    }
    .suggestion-item:hover, .suggestion-item.active {
      background: #30363d;
      color: #e6edf3;
    }
    .table { width: 100%; border-collapse: collapse; margin: 8px 0; }
    .table th, .table td { padding: 6px 12px; text-align: left; border-bottom: 1px solid #30363d; }
    .table th { color: #8b949e; font-weight: normal; }
    .table tr:hover { background: #161b22; }
    .box { border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin: 8px 0; background: #161b22; }
    .box-title { color: #58a6ff; margin-bottom: 8px; font-weight: bold; }
    .repo-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #30363d; }
    .repo-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .repo-name { color: #58a6ff; font-weight: bold; }
    .repo-desc { color: #8b949e; margin: 4px 0; }
    .repo-meta { display: flex; gap: 16px; font-size: 12px; color: #8b949e; }
    .tag { background: #238636; color: #fff; padding: 1px 6px; border-radius: 3px; font-size: 11px; }
    .skill-bar { display: flex; align-items: center; gap: 12px; margin: 6px 0; }
    .skill-name { width: 180px; color: #c9d1d9; font-size: 13px; }
    .skill-track { flex: 1; height: 6px; background: #30363d; border-radius: 3px; overflow: hidden; }
    .skill-fill { height: 100%; background: linear-gradient(90deg, #58a6ff, #a371f7); border-radius: 3px; transition: width 0.5s ease; }
    .skill-pct { width: 40px; text-align: right; color: #8b949e; font-size: 12px; }
    footer {
      text-align: center;
      padding: 20px;
      color: #484f58;
      font-size: 12px;
      border-top: 1px solid #30363d;
      margin-top: auto;
    }
    footer a { color: #58a6ff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    @media (max-width: 600px) {
      .terminal { padding: 10px; }
      .output { padding: 12px; font-size: 13px; }
      .skill-name { width: 120px; font-size: 12px; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="terminal">
    <div class="header">
      <div class="header-title">
        <span class="traffic-light tl-red"></span>
        <span class="traffic-light tl-yellow"></span>
        <span class="traffic-light tl-green"></span>
        <span style="margin-left: 12px;">david-escoto-dev — Interactive Terminal</span>
      </div>
    </div>
    <div class="output" id="output"></div>
  </div>
  <footer>
    <a href="https://github.com/DavidEscotoDev" target="_blank">GitHub</a> •
    <a href="mailto:real.david.escoto@gmail.com">Email</a> •
    <a href="https://linkedin.com/in/david-escoto-estrada-1ab5633b9" target="_blank">LinkedIn</a>
  </footer>

<script>
const COMMANDS = {
  help: {
    desc: 'Show available commands',
    fn: () => renderHelp()
  },
  repos: {
    desc: 'List pinned repositories',
    fn: () => renderRepos()
  },
  experience: {
    desc: 'Show work experience & projects',
    fn: () => renderExperience()
  },
  skills: {
    desc: 'Display tech stack & capabilities',
    fn: () => renderSkills()
  },
  contact: {
    desc: 'Show contact information',
    fn: () => renderContact()
  }
};

const REPOS = [
  { name: 'Framework', stars: 1, lang: 'Python', desc: 'Production-grade multi-agent system for autonomous code gen, review, and testing.', topics: ['ai-agents', 'fastapi', 'llm', 'multi-agent'], url: 'https://github.com/DavidEscotoDev/Framework' },
  { name: 'kalshi_bot', stars: 1, lang: 'Python', desc: 'Production-grade Kalshi trading bot with kill switches, Kelly sizing, VaR limits, and shadow-mode validation.', topics: ['async-python', 'financial-engineering', 'kalshi', 'prediction-markets'], url: 'https://github.com/DavidEscotoDev/kalshi_bot' },
  { name: 'kalshi-pi-bot', stars: 0, lang: 'Python', desc: 'Kalshi trading algorithm optimized for Raspberry Pi deployment.', topics: ['raspberry-pi', 'trading', 'embedded'], url: 'https://github.com/DavidEscotoDev/kalshi-pi-bot' },
  { name: 'doc-intel-api', stars: 0, lang: 'Python', desc: 'Document intelligence API.', topics: ['document-processing', 'api'], url: 'https://github.com/DavidEscotoDev/doc-intel-api' },
  { name: 'PAPYRUS-AI', stars: 0, lang: 'Python', desc: 'New AI/ML project.', topics: ['ai', 'ml'], url: 'https://github.com/DavidEscotoDev/PAPYRUS-AI' }
];

const SKILLS = [
  { category: 'Languages', items: [
    { name: 'Python', pct: 95 },
    { name: 'JavaScript', pct: 85 },
    { name: 'TypeScript', pct: 80 },
    { name: 'SQL', pct: 70 }
  ]},
  { category: 'AI/ML', items: [
    { name: 'LLM Fine-tuning', pct: 90 },
    { name: 'Multi-Agent Systems', pct: 90 },
    { name: 'Agent Frameworks', pct: 85 },
    { name: 'RAG', pct: 85 }
  ]},
  { category: 'Backend', items: [
    { name: 'FastAPI', pct: 95 },
    { name: 'Async Python', pct: 95 },
    { name: 'WebSockets', pct: 85 },
    { name: 'REST APIs', pct: 90 }
  ]},
  { category: 'FinTech', items: [
    { name: 'Algorithmic Trading', pct: 85 },
    { name: 'Risk Management', pct: 80 },
    { name: 'Prediction Markets', pct: 90 },
    { name: 'Kalshi API', pct: 95 }
  ]},
  { category: 'DevOps', items: [
    { name: 'Docker', pct: 80 },
    { name: 'Raspberry Pi', pct: 85 },
    { name: 'Git/GitHub', pct: 95 },
    { name: 'Linux', pct: 90 }
  ]}
];

const EXPERIENCE = [
  {
    role: 'Software Developer',
    focus: 'AI Agent Frameworks & LLM Fine-tuning',
    desc: 'Building robust, data-driven automation systems.',
    projects: [
      'Framework — Multi-agent coding agent (FastAPI + LLMs)',
      'kalshi_bot — Production trading bot with risk management',
      'kalshi-pi-bot — Embedded trading on Raspberry Pi'
    ],
    achievements: [
      'Teen developer shipping production-grade systems',
      'MIT licensed open source projects',
      'Financial engineering + AI intersection'
    ]
  }
];

let history = [];
let historyIndex = -1;
let suggestionBox = null;
let currentSuggestion = -1;

const output = document.getElementById('output');

function addLine(text, cls = '') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function addHTML(html, cls = '') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.innerHTML = html;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function typeLine(line, cls, delay, callback) {
  let i = 0;
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  output.appendChild(div);
  
  function typeChar() {
    if (i < line.length) {
      div.textContent += line[i];
      i++;
      output.scrollTop = output.scrollHeight;
      setTimeout(typeChar, delay);
    } else if (callback) {
      callback();
    }
  }
  typeChar();
}

function renderBanner() {
  const bannerLines = [
    '██████╗ ███████╗████████╗██████╗ ██╗██╗  ██╗███████╗███████╗',
    '██╔══██╗██╔════╝╚══██╔══╝██╔══██╗██║██║ ██╔╝██╔════╝██╔════╝',
    '██████╔╝█████╗     ██║   ██████╔╝██║█████╔╝ █████╗  ███████╗',
    '██╔═══╝ ██╔══╝     ██║   ██╔══██╗██║██╔═██╗ ██╔══╝  ╚════██║',
    '██║     ███████╗   ██║   ██║  ██║██║██║  ██╗███████╗███████║',
    '╚═╝     ╚══════╝   ╚═╝   ╚═╝  ╚═╝╚═╝╚═╝  ╚═╝╚══════╝╚══════╝',
    '',
    'Software Developer • AI Agent Frameworks • LLM Fine-tuning',
    'North Bend, WA  |  Teen Builder',
    '',
    'Version: 1.0.0  |  Session: david-escoto-dev',
    ''
  ];
  
  let lineIndex = 0;
  
  function typeNextLine() {
    if (lineIndex < bannerLines.length) {
      const line = bannerLines[lineIndex];
      const cls = lineIndex < 6 ? 'banner' : (line === '' ? '' : 'dim');
      const delay = lineIndex < 6 ? 5 : (line === '' ? 0 : 15);
      typeLine(line, cls, delay, () => {
        lineIndex++;
        typeNextLine();
      });
    } else {
      renderHelp();
    }
  }
  
  typeNextLine();
}

function renderHelp() {
  addHTML('<div class="box"><div class="box-title">Commands</div></div>', '');
  const table = document.createElement('table');
  table.className = 'table';
  table.innerHTML = '<thead><tr><th>Command</th><th>Description</th></tr></thead><tbody>' +
    Object.entries(COMMANDS).map(([cmd, c]) => `<tr><td class="cmd">/${cmd}</td><td>${c.desc}</td></tr>`).join('') +
    '</tbody></table>';
  output.appendChild(table);
  output.scrollTop = output.scrollHeight;
}

function renderRepos() {
  addHTML('<div class="box"><div class="box-title">Pinned Repositories</div></div>', '');
  REPOS.forEach((repo, i) => {
    const topics = repo.topics.map(t => `<span class="tag">${t}</span>`).join(' ');
    addHTML(`
      <div class="repo-item">
        <div class="repo-name"><a href="${repo.url}" target="_blank" class="url">${repo.name}</a> <span class="dim">[${repo.stars}]</span> <span class="key">${repo.lang}</span></div>
        <div class="repo-desc">${repo.desc}</div>
        <div class="repo-meta">${topics}</div>
      </div>
    `, '');
  });
}

function renderExperience() {
  addHTML('<div class="box"><div class="box-title">Experience</div></div>', '');
  EXPERIENCE.forEach(exp => {
    addHTML(`<div class="key">${exp.role}</div>`, '');
    addHTML(`<div class="dim">${exp.focus}</div>`, '');
    addHTML(`<div class="val">${exp.desc}</div>`, '');
    addLine('');
    addLine('Key Projects:', 'key');
    exp.projects.forEach(p => addLine(`  • ${p}`, 'val'));
    addLine('');
    addLine('Achievements:', 'key');
    exp.achievements.forEach(a => addLine(`  • ${a}`, 'val'));
    addLine('');
  });
}

function renderSkills() {
  addHTML('<div class="box"><div class="box-title">Tech Stack</div></div>', '');
  SKILLS.forEach(cat => {
    addLine(`\n${cat.category}:`, 'key');
    cat.items.forEach(skill => {
      const div = document.createElement('div');
      div.className = 'line skill-bar';
      div.innerHTML = `
        <span class="skill-name">${skill.name}</span>
        <div class="skill-track"><div class="skill-fill" style="width: ${skill.pct}%"></div></div>
        <span class="skill-pct">${skill.pct}%</span>
      `;
      output.appendChild(div);
    });
  });
  output.scrollTop = output.scrollHeight;
}

function renderContact() {
  addHTML('<div class="box"><div class="box-title">Contact</div></div>', '');
  addHTML(`
    <table class="table">
      <tbody>
        <tr><td class="key">Email</td><td><a href="mailto:real.david.escoto@gmail.com" class="url">real.david.escoto@gmail.com</a></td></tr>
        <tr><td class="key">GitHub</td><td><a href="https://github.com/DavidEscotoDev" target="_blank" class="url">github.com/DavidEscotoDev</a></td></tr>
        <tr><td class="key">LinkedIn</td><td><a href="https://linkedin.com/in/david-escoto-estrada-1ab5633b9" target="_blank" class="url">linkedin.com/in/david-escoto-estrada-1ab5633b9</a></td></tr>
        <tr><td class="key">Location</td><td class="val">North Bend, Washington</td></tr>
      </tbody>
    </table>
  `, '');
  addLine('');
  addLine('"Building robust, data-driven automation."', 'dim');
}

function renderWhoami() {
  addLine('david@github', 'path');
  addLine('Software Developer — AI Agent Frameworks & LLM Fine-tuning', 'val');
  addLine('Teen Builder | North Bend, WA', 'dim');
}

function execute(cmdLine) {
  const parts = cmdLine.trim().split(/\s+/);
  if (!parts[0]) return;
  const cmd = parts[0].toLowerCase().replace(/^\//, '');
  const args = parts.slice(1);

  if (COMMANDS[cmd]) {
    addLine(`> /${cmd} ${args.join(' ')}`, 'cmd');
    COMMANDS[cmd].fn(args);
  } else {
    addLine(`> /${cmd} ${args.join(' ')}`, 'cmd');
    addLine(`Command not found: /${cmd}. Type /help for available commands.`, 'error');
  }
  history.push(cmdLine.trim());
  historyIndex = history.length;
}

function showSuggestions(input) {
  if (suggestionBox) suggestionBox.remove();
  const base = input.toLowerCase().replace(/^\//, '');
  const matches = Object.keys(COMMANDS).filter(c => c.startsWith(base));
  if (!matches.length) return;

  suggestionBox = document.createElement('div');
  suggestionBox.className = 'suggestion';
  matches.forEach((cmd, i) => {
    const item = document.createElement('div');
    item.className = 'suggestion-item' + (i === 0 ? ' active' : '');
    item.dataset.cmd = cmd;
    item.textContent = `/${cmd} — ${COMMANDS[cmd].desc}`;
    suggestionBox.appendChild(item);
  });
  document.body.appendChild(suggestionBox);
  positionSuggestionBox();
  currentSuggestion = 0;
}

function positionSuggestionBox() {
  if (!suggestionBox) return;
  const inputLine = document.querySelector('.input-line');
  const rect = inputLine.getBoundingClientRect();
  suggestionBox.style.left = rect.left + 'px';
  suggestionBox.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
}

function hideSuggestions() {
  if (suggestionBox) { suggestionBox.remove(); suggestionBox = null; }
}

function selectSuggestion(dir) {
  if (!suggestionBox) return;
  const items = suggestionBox.querySelectorAll('.suggestion-item');
  if (!items.length) return;
  items[currentSuggestion].classList.remove('active');
  currentSuggestion = (currentSuggestion + dir + items.length) % items.length;
  items[currentSuggestion].classList.add('active');
}

function applySuggestion() {
  if (!suggestionBox) return;
  const items = suggestionBox.querySelectorAll('.suggestion-item');
  if (items[currentSuggestion]) {
    const cmd = items[currentSuggestion].dataset.cmd;
    input.value = `/${cmd} `;
    hideSuggestions();
    input.focus();
  }
}

function renderPrompt() {
  const line = document.createElement('div');
  line.className = 'input-line';
  line.innerHTML = `
    <span class="prompt"><span class="prompt-path">david@github</span><span class="prompt-symbol"> ~</span></span>
    <span class="prompt-symbol">></span>
    <input type="text" class="cmd-input" id="cmdInput" autocomplete="off" spellcheck="false">
    <span class="cursor" id="cursor"></span>
  `;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
  return document.getElementById('cmdInput');
}

let input = renderPrompt();

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = input.value.trim();
    hideSuggestions();
    if (val) {
      input.remove();
      execute(val);
      input = renderPrompt();
      setupInput(input);
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      input.value = history[historyIndex];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex < history.length - 1) {
      historyIndex++;
      input.value = history[historyIndex];
    } else {
      historyIndex = history.length;
      input.value = '';
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    if (suggestionBox) {
      applySuggestion();
    } else {
      const val = input.value.toLowerCase();
      if (val.startsWith('/')) {
        showSuggestions(val);
      }
    }
  } else if (e.key === 'Escape') {
    hideSuggestions();
  }
});

input.addEventListener('input', (e) => {
  const val = e.target.value;
  if (val.startsWith('/')) {
    showSuggestions(val);
  } else {
    hideSuggestions();
  }
});

input.addEventListener('blur', () => {
  setTimeout(hideSuggestions, 200);
});

function setupInput(inp) {
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = inp.value.trim();
      hideSuggestions();
      if (val) {
        inp.remove();
        execute(val);
        input = renderPrompt();
        setupInput(input);
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        inp.value = history[historyIndex];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex < history.length - 1) {
        historyIndex++;
        inp.value = history[historyIndex];
      } else {
        historyIndex = history.length;
        inp.value = '';
      }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      if (suggestionBox) applySuggestion();
      else if (inp.value.toLowerCase().startsWith('/')) showSuggestions(inp.value);
    } else if (e.key === 'Escape') {
      hideSuggestions();
    }
  });
  inp.addEventListener('input', (e) => {
    const val = e.target.value;
    if (val.startsWith('/')) showSuggestions(val);
    else hideSuggestions();
  });
  inp.addEventListener('blur', () => setTimeout(hideSuggestions, 200));
  inp.focus();
}

window.addEventListener('resize', positionSuggestionBox);

// Initial render
renderBanner();
</script>
</body>
</html>
