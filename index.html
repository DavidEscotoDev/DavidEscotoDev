<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David Escoto ‚ÄĒ Terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Monaco', 'Consolas', monospace;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .terminal {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .header {
      border: 1px solid #30363d;
      border-radius: 6px 6px 0 0;
      background: #161b22;
      padding: 12px 16px;
      font-size: 12px;
      color: #8b949e;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .traffic-light { width: 10px; height: 10px; border-radius: 50%; }
    .tl-red { background: #ff5f57; }
    .tl-yellow { background: #ffbd2e; }
    .tl-green { background: #28ca42; }
    .terminal-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #30363d;
      border-right: 1px solid #30363d;
      border-bottom: 1px solid #30363d;
      border-radius: 0 0 6px 6px;
      background: #0d1117;
      min-height: 500px;
    }
    .output {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      line-height: 1.7;
      cursor: text;
    }
    .input-container {
      border-top: 1px solid #21262d;
      padding: 8px 16px 12px;
      background: #0d1117;
    }
    .input-line {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .prompt { color: #58a6ff; white-space: nowrap; margin-right: 8px; }
    input.cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.7;
      caret-color: #58a6ff;
    }
    .line { margin-bottom: 2px; white-space: pre-wrap; word-wrap: break-word; }
    .line.banner { color: #58a6ff; font-weight: bold; }
    .line.dim { color: #6e7681; }
    .line.error { color: #f85149; }
    .line.key { color: #ffa657; }
    .line.val { color: #c9d1d9; }
    .line.url { color: #58a6ff; text-decoration: underline; cursor: pointer; }
    .suggestion {
      position: absolute;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      color: #8b949e;
      z-index: 100;
      max-height: 200px;
      overflow-y: auto;
    }
    .suggestion-item {
      padding: 2px 8px;
      cursor: pointer;
      border-radius: 3px;
    }
    .suggestion-item:hover, .suggestion-item.active {
      background: #30363d;
      color: #c9d1d9;
    }
    .table { width: 100%; border-collapse: collapse; margin: 6px 0; }
    .table th, .table td { padding: 4px 10px; text-align: left; border-bottom: 1px solid #21262d; }
    .table th { color: #8b949e; font-weight: normal; }
    .repo-item { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #21262d; }
    .repo-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .repo-name { color: #58a6ff; font-weight: bold; }
    .repo-desc { color: #8b949e; margin: 4px 0 6px; }
    .repo-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { background: #238636; color: #fff; padding: 1px 6px; border-radius: 3px; font-size: 11px; }
    .skill-row { display: flex; align-items: center; gap: 10px; margin: 4px 0; }
    .skill-name { width: 160px; color: #c9d1d9; font-size: 13px; }
    .skill-track { flex: 1; height: 5px; background: #21262d; border-radius: 3px; overflow: hidden; }
    .skill-fill { height: 100%; background: #58a6ff; border-radius: 3px; }
    .skill-pct { width: 36px; text-align: right; color: #6e7681; font-size: 12px; }
    footer {
      text-align: center;
      padding: 16px;
      color: #484f58;
      font-size: 12px;
      border-top: 1px solid #21262d;
    }
    footer a { color: #58a6ff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    @media (max-width: 600px) {
      .terminal { padding: 10px; }
      .terminal-body { min-height: 400px; }
      .output { padding: 12px 12px 4px; font-size: 13px; }
      .input-container { padding: 6px 12px 10px; }
      .skill-name { width: 110px; font-size: 12px; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="terminal">
    <div class="header">
      <div class="header-title">
        <span class="traffic-light tl-red"></span>
        <span class="traffic-light tl-yellow"></span>
        <span class="traffic-light tl-green"></span>
        <span style="margin-left: 12px;">david-escoto-dev ‚ÄĒ terminal</span>

    </div>
    <div class="terminal-body">
      <div class="output" id="output"></div>
      <div class="input-container" id="inputContainer">
        <div class="input-line">

        </div>
      </div>
    </div>
  </div>
  <footer>
    <a href="https://github.com/DavidEscotoDev" target="_blank">github</a>
    &nbsp;&middot;&nbsp;
    <a href="mailto:real.david.escoto@gmail.com">email</a>

    <a href="https://linkedin.com/in/david-escoto-estrada-1ab5633b9" target="_blank">linkedin</a>

<script>

  experience:{ desc: 'Show work experience',         fn: () => renderExperience() },
  skills:    { desc: 'Display tech stack',           fn: () => renderSkills() },
  contact:   { desc: 'Show contact information',    fn: () => renderContact() }
};

const REPOS = [
  { name:'Framework',       stars:1, lang:'Python', desc:'Production-grade multi-agent system for autonomous code gen, review, and testing.', topics:['ai-agents','fastapi','llm','multi-agent'], url:'https://github.com/DavidEscotoDev/Framework' },
  { name:'kalshi_bot',      stars:1, lang:'Python', desc:'Production-grade Kalshi trading bot with kill switches, Kelly sizing, VaR limits, and shadow-mode validation.', topics:['async-python','financial-engineering','kalshi','prediction-markets'], url:'https://github.com/DavidEscotoDev/kalshi_bot' },
  { name:'kalshi-pi-bot',   stars:0, lang:'Python', desc:'Kalshi trading algorithm optimized for Raspberry Pi deployment.', topics:['raspberry-pi','trading','embedded'], url:'https://github.com/DavidEscotoDev/kalshi-pi-bot' },
  { name:'doc-intel-api',   stars:0, lang:'Python', desc:'Document intelligence API.', topics:['document-processing','api'], url:'https://github.com/DavidEscotoDev/doc-intel-api' },
  { name:'PAPYRUS-AI',      stars:0, lang:'Python', desc:'AI/ML project.', topics:['ai','ml'], url:'https://github.com/DavidEscotoDev/PAPYRUS-AI' }

const SKILLS = [

    { name:'Python', pct:95 }, { name:'JavaScript', pct:85 },
    { name:'TypeScript', pct:80 }, { name:'SQL', pct:70 }
  ]},

    { name:'Agent Frameworks', pct:85 }, { name:'RAG', pct:85 }
  ]},
  { category:'Backend', items:[
    { name:'FastAPI', pct:95 }, { name:'Async Python', pct:95 },
    { name:'WebSockets', pct:85 }, { name:'REST APIs', pct:90 }
  ]},
  { category:'FinTech', items:[
    { name:'Algorithmic Trading', pct:85 }, { name:'Risk Management', pct:80 },
    { name:'Prediction Markets', pct:90 }, { name:'Kalshi API', pct:95 }
  ]},
  { category:'DevOps', items:[
    { name:'Docker', pct:80 }, { name:'Raspberry Pi', pct:85 },
    { name:'Git/GitHub', pct:95 }, { name:'Linux', pct:90 }
  ]}
];

const EXPERIENCE = [{
  role: 'Software Developer',
  focus: 'AI Agent Frameworks & LLM Fine-tuning',
  desc: 'Building robust, data-driven automation systems.',
  projects: [
    'Framework ‚ÄĒ Multi-agent coding agent (FastAPI + LLMs)',
    'kalshi_bot ‚ÄĒ Production trading bot with risk management',
    'kalshi-pi-bot ‚ÄĒ Embedded trading on Raspberry Pi'
  ],
  achievements: [
    'Teen developer shipping production-grade systems',
    'MIT licensed open source projects',
    'Financial engineering + AI intersection'
  ]
}];

let history = [];
let historyIndex = -1;
let suggestionBox = null;
let currentSuggestion = -1;

const output = document.getElementById('output');
const input = document.getElementById('cmdInput');

function addLine(target, text, cls) {
  const div = document.createElement('div');
  div.className = 'line ' + (cls || '');
  div.textContent = text;
  target.appendChild(div);
}

function addHTML(target, html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  target.appendChild(div);
}

function typeLine(target, text, cls, delay, cb) {
  let i = 0;
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  target.appendChild(div);
  (function tick() {
    if (i < text.length) {
      div.textContent += text[i++];
      output.scrollTop = output.scrollHeight;
      setTimeout(tick, delay);
    } else if (cb) cb();
  })();
}

function renderBanner() {
  const lines = [
    '‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó',
    '‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ',
    '‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó     ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó',
    '‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ     ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēĎ',
    '‚Ėą‚Ėą‚ēĎ ‚ēö‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ',
    '‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ',
    '',
    '  Software Developer | AI Agent Frameworks | LLM Fine-tuning',
    '  North Bend, WA | Teen Builder'
  ];
  let i = 0;
  (function next() {
    if (i < lines.length) {
      const cls = i < 6 ? 'banner' : 'dim';
      typeLine(output, lines[i], cls, i < 6 ? 8 : 12, () => { i++; next(); });
    } else {
      addLine(output, '', '');
      renderHelp();
      input.focus();
    }
  })();
}

function renderHelp() {
  const rows = Object.entries(COMMANDS)
    .map(([cmd, c]) => '<tr><td style="color:#58a6ff">/' + cmd + '</td><td style="color:#8b949e">' + c.desc + '</td></tr>')
    .join('');
  addHTML(output, '<table class="table"><thead><tr><th>Command</th><th>Description</th></tr></thead><tbody>' + rows + '</tbody></table>');
  output.scrollTop = output.scrollHeight;
}

function renderRepos() {
  REPOS.forEach(r => {
    const tags = r.topics.map(t => '<span class="tag">' + t + '</span>').join(' ');
    addHTML(output,
      '<div class="repo-item">' +
        '<span class="repo-name"><a href="' + r.url + '" target="_blank" class="url">' + r.name + '</a></span> ' +
        '<span class="dim">[' + r.stars + '*]</span> ' +
        '<span style="color:#ffa657">' + r.lang + '</span>' +
        '<div class="repo-desc">' + r.desc + '</div>' +
        '<div class="repo-meta">' + tags + '</div>' +
      '</div>'
    );
  });
  output.scrollTop = output.scrollHeight;
}

function renderExperience() {
  EXPERIENCE.forEach(e => {
    addHTML(output, '<div style="color:#ffa657">' + e.role + '</div>');
    addHTML(output, '<div style="color:#8b949e">' + e.focus + '</div>');
    addHTML(output, '<div>' + e.desc + '</div>');
    addLine(output, '', '');
    addLine(output, '  Key Projects:', 'key');
    e.projects.forEach(p => addLine(output, '    ' + p, 'val'));
    addLine(output, '', '');
    addLine(output, '  Achievements:', 'key');
    e.achievements.forEach(a => addLine(output, '    ' + a, 'val'));
  });
  output.scrollTop = output.scrollHeight;
}

function renderSkills() {
  SKILLS.forEach(cat => {
    addLine(output, cat.category + ':', 'key');
    cat.items.forEach(s => {
      const div = document.createElement('div');
      div.className = 'line skill-row';
      div.innerHTML =
        '<span class="skill-name">' + s.name + '</span>' +
        '<div class="skill-track"><div class="skill-fill" style="width:' + s.pct + '%"></div></div>' +
        '<span class="skill-pct">' + s.pct + '%</span>';
      output.appendChild(div);
    });
    addLine(output, '', '');
  });
  output.scrollTop = output.scrollHeight;
}

function renderContact() {
  addHTML(output,
    '<table class="table"><tbody>' +
      '<tr><td style="color:#ffa657">Email</td><td><a href="mailto:real.david.escoto@gmail.com" class="url">real.david.escoto@gmail.com</a></td></tr>' +
      '<tr><td style="color:#ffa657">GitHub</td><td><a href="https://github.com/DavidEscotoDev" target="_blank" class="url">github.com/DavidEscotoDev</a></td></tr>' +
      '<tr><td style="color:#ffa657">LinkedIn</td><td><a href="https://linkedin.com/in/david-escoto-estrada-1ab5633b9" target="_blank" class="url">linkedin.com/in/david-escoto-estrada-1ab5633b9</a></td></tr>' +
      '<tr><td style="color:#ffa657">Location</td><td>North Bend, Washington</td></tr>' +
    '</tbody></table>'
  );
  addLine(output, '', '');
  addLine(output, '  "Building robust, data-driven automation."', 'dim');
  output.scrollTop = output.scrollHeight;
}

function execute(cmdLine) {
  const parts = cmdLine.trim().split(/\s+/);
  if (!parts[0]) return;
  const cmd = parts[0].toLowerCase().replace(/^\//, '');
  output.innerHTML = '';
  if (COMMANDS[cmd]) {
    COMMANDS[cmd].fn();
  } else {
    addHTML(output, '<div style="color:#f85149">command not found: /' + cmd + ' <span style="color:#6e7681">(type /help for commands)</span></div>');
  }
  history.push(cmdLine.trim());
  historyIndex = history.length;
}

function showSuggestions(val) {
  hideSuggestions();
  const base = val.toLowerCase().replace(/^\//, '');
  const matches = Object.keys(COMMANDS).filter(c => c.startsWith(base));
  if (!matches.length) return;
  suggestionBox = document.createElement('div');
  suggestionBox.className = 'suggestion';
  matches.forEach((cmd, i) => {
    const item = document.createElement('div');
    item.className = 'suggestion-item' + (i === 0 ? ' active' : '');
    item.dataset.cmd = cmd;
    item.textContent = '/' + cmd + ' ‚ÄĒ ' + COMMANDS[cmd].desc;
    suggestionBox.appendChild(item);
  });
  document.body.appendChild(suggestionBox);
  const rect = input.getBoundingClientRect();
  suggestionBox.style.left = rect.left + 'px';
  suggestionBox.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
  currentSuggestion = 0;
}

function hideSuggestions() {
  if (suggestionBox) { suggestionBox.remove(); suggestionBox = null; }
}

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = input.value.trim();
    input.value = '';
    if (val) execute(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex > 0) { historyIndex--; input.value = history[historyIndex]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex < history.length - 1) { historyIndex++; input.value = history[historyIndex]; }
    else { historyIndex = history.length; input.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    if (suggestionBox) {
      const items = suggestionBox.querySelectorAll('.suggestion-item');
      if (items[currentSuggestion]) {
        input.value = '/' + items[currentSuggestion].dataset.cmd + ' ';
        hideSuggestions();
      }
    } else if (input.value.startsWith('/')) {
      showSuggestions(input.value);
    }
  } else if (e.key === 'Escape') {
    hideSuggestions();
  }
});

input.addEventListener('input', function() {
  if (input.value.startsWith('/')) showSuggestions(input.value);
  else hideSuggestions();
});

input.addEventListener('blur', () => setTimeout(hideSuggestions, 200));
output.addEventListener('click', () => input.focus());

renderBanner();
</script>
</body>
</html>
